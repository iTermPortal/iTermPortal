name: PR Build - iTermPortal

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build unsigned Debug app
        run: |
          xcodebuild \
            -project iTermPortal.xcodeproj \
            -scheme iTermPortal \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Verify bundle structure
        run: |
          APP="build/DerivedData/Build/Products/Debug/iTermPortal.app"
          SYNC="$APP/Contents/PlugIns/iTermPortalSync.appex"
          test -d "$APP"
          test -d "$SYNC"
          /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPointIdentifier" \
            "$SYNC/Contents/Info.plist" | grep "com.apple.FinderSync"
          /usr/libexec/PlistBuddy -c "Print :LSUIElement" \
            "$APP/Contents/Info.plist" | grep "true"

      - name: Package artifact
        run: |
          APP="build/DerivedData/Build/Products/Debug/iTermPortal.app"
          rm -f build/iTermPortal-macos.zip
          ditto -c -k --sequesterRsrc --keepParent "$APP" build/iTermPortal-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: itermportal-macos-pr-build
          path: build/iTermPortal-macos.zip
          if-no-files-found: error
          retention-days: 7
