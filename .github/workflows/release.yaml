name: Release iTermPortal (Signed macOS build)

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: itermportal-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-latest
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_DIRECT_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_DIRECT_PROVISIONING_PROFILE_BASE64 }}
      APPLE_DIRECT_SYNC_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_DIRECT_SYNC_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID_FPORTAL: ${{ secrets.APPLE_API_KEY_ID_FPORTAL }}
      APPLE_API_KEY_FPORTAL: ${{ secrets.APPLE_API_KEY_FPORTAL }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APP_BUNDLE_ID_VAR: ${{ vars.APPLE_APP_BUNDLE_ID }}
      APP_BUNDLE_ID_SECRET: ${{ secrets.APPLE_APP_BUNDLE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve bundle id and notarization mode
        shell: bash
        run: |
          set -euo pipefail

          APP_BUNDLE_ID="${APP_BUNDLE_ID_VAR:-}"
          if [[ -z "$APP_BUNDLE_ID" && -n "${APP_BUNDLE_ID_SECRET:-}" ]]; then
            APP_BUNDLE_ID="$APP_BUNDLE_ID_SECRET"
          fi
          if [[ -z "$APP_BUNDLE_ID" ]]; then
            APP_BUNDLE_ID="com.hjoncour.fportal"
          fi
          if [[ "$APP_BUNDLE_ID" != "com.hjoncour.fportal" ]]; then
            echo "::error::This project currently expects bundle id com.hjoncour.fportal, got '$APP_BUNDLE_ID'."
            exit 1
          fi

          APPLE_API_KEY_RESOLVED="${APPLE_API_KEY:-}"
          if [[ -z "$APPLE_API_KEY_RESOLVED" && -n "${APPLE_API_KEY_ID_FPORTAL:-}" ]]; then
            APPLE_API_KEY_RESOLVED="$APPLE_API_KEY_ID_FPORTAL"
          fi
          if [[ -z "$APPLE_API_KEY_RESOLVED" && -n "${APPLE_API_KEY_FPORTAL:-}" ]]; then
            APPLE_API_KEY_RESOLVED="$APPLE_API_KEY_FPORTAL"
          fi

          if [[ -n "$APPLE_API_KEY_RESOLVED" && -n "${APPLE_API_ISSUER:-}" && -n "${APPLE_API_KEY_P8:-}" ]]; then
            NOTARIZE_MODE="api_key"
          elif [[ -n "${APPLE_ID:-}" && -n "${APPLE_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; then
            NOTARIZE_MODE="apple_id"
          else
            NOTARIZE_MODE="skip"
          fi

          echo "APP_BUNDLE_ID=$APP_BUNDLE_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_RESOLVED=$APPLE_API_KEY_RESOLVED" >> "$GITHUB_ENV"
          echo "NOTARIZE_MODE=$NOTARIZE_MODE" >> "$GITHUB_ENV"

      - name: Validate required signing secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            APPLE_CERTIFICATE
            APPLE_CERTIFICATE_PASSWORD
            APPLE_DIRECT_PROVISIONING_PROFILE_BASE64
            APPLE_DIRECT_SYNC_PROVISIONING_PROFILE_BASE64
            KEYCHAIN_PASSWORD
            APPLE_TEAM_ID
          )
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing required value: $key"
              exit 1
            fi
          done

      - name: Install direct distribution profiles
        shell: bash
        run: |
          set -euo pipefail
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          echo "$APPLE_DIRECT_PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/main-direct.provisionprofile
          MAIN_UUID=$(security cms -D -i /tmp/main-direct.provisionprofile | \
            /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
          cp /tmp/main-direct.provisionprofile "$PROFILES_DIR/$MAIN_UUID.provisionprofile"

          echo "$APPLE_DIRECT_SYNC_PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/sync-direct.provisionprofile
          SYNC_UUID=$(security cms -D -i /tmp/sync-direct.provisionprofile | \
            /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
          cp /tmp/sync-direct.provisionprofile "$PROFILES_DIR/$SYNC_UUID.provisionprofile"

          echo "MAIN_UUID=$MAIN_UUID" >> "$GITHUB_ENV"
          echo "SYNC_UUID=$SYNC_UUID" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        shell: bash
        run: |
          set -euxo pipefail

          echo "$APPLE_CERTIFICATE" | base64 --decode > developer_id.p12
          KEYCHAIN_PATH="$RUNNER_TEMP/release-build.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"

          security import developer_id.p12 -A -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          APP_SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | \
            awk -F\" '/Developer ID Application/ {print $2; exit}')

          if [[ -z "$APP_SIGNING_IDENTITY" ]]; then
            echo "::error::No Developer ID Application signing identity found."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi

          echo "APP_SIGNING_IDENTITY=$APP_SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key file
        if: ${{ env.NOTARIZE_MODE == 'api_key' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          KEY_FILE="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_RESOLVED}.p8"
          printf "%s" "$APPLE_API_KEY_P8" > "$KEY_FILE"
          echo "AUTH_KEY_PATH=$KEY_FILE" >> "$GITHUB_ENV"

      - name: Archive direct-install app
        shell: bash
        run: |
          set -euxo pipefail
          APP_VERSION="$(grep -m1 '^version' ssmver.toml | sed 's/.*= *\"//;s/\"//')"
          xcodebuild archive \
            -project iTermPortal.xcodeproj \
            -scheme iTermPortal \
            -configuration DirectInstall \
            -archivePath build/iTermPortal.xcarchive \
            -derivedDataPath build/DerivedData \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$APP_SIGNING_IDENTITY" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Export Developer ID app
        shell: bash
        run: |
          set -euxo pipefail
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0"><dict>
            <key>method</key><string>developer-id</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key><dict>
              <key>$APP_BUNDLE_ID</key><string>$MAIN_UUID</string>
              <key>$APP_BUNDLE_ID.sync</key><string>$SYNC_UUID</string>
            </dict>
          </dict></plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/iTermPortal.xcarchive \
            -exportPath build/Export \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Verify exported app
        shell: bash
        run: |
          set -euo pipefail
          APP_EXPORT="$(find build/Export -maxdepth 1 -name '*.app' | head -n1)"
          if [[ -z "$APP_EXPORT" ]]; then
            echo "::error::No exported .app found in build/Export"
            exit 1
          fi
          SYNC="$APP_EXPORT/Contents/PlugIns/iTermPortalSync.appex"
          test -d "$SYNC"
          /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPointIdentifier" \
            "$SYNC/Contents/Info.plist" | grep -q "com.apple.FinderSync"
          echo "APP_EXPORT=$APP_EXPORT" >> "$GITHUB_ENV"

      - name: Package app zip
        shell: bash
        run: |
          set -euxo pipefail
          rm -f build/iTermPortal-macos.zip
          ditto -c -k --sequesterRsrc --keepParent "$APP_EXPORT" build/iTermPortal-macos.zip

      - name: Notarize and staple zip
        if: ${{ env.NOTARIZE_MODE != 'skip' }}
        shell: bash
        run: |
          set -euxo pipefail

          if [[ "$NOTARIZE_MODE" == "api_key" ]]; then
            xcrun notarytool submit build/iTermPortal-macos.zip \
              --key "$AUTH_KEY_PATH" \
              --key-id "$APPLE_API_KEY_RESOLVED" \
              --issuer "$APPLE_API_ISSUER" \
              --wait --output-format json | tee notary-result.json
          else
            xcrun notarytool submit build/iTermPortal-macos.zip \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_PASSWORD" \
              --wait --output-format json | tee notary-result.json
          fi

          STATUS=$(python3 -c "import json; print(json.load(open('notary-result.json')).get('status',''))")
          if [[ "$STATUS" != "Accepted" ]]; then
            echo "::error::Notarization was not accepted. Status: '$STATUS'"
            exit 1
          fi

          xcrun stapler staple -v "$APP_EXPORT"
          rm -f build/iTermPortal-macos.zip
          ditto -c -k --sequesterRsrc --keepParent "$APP_EXPORT" build/iTermPortal-macos.zip

      - name: Warn if notarization was skipped
        if: ${{ env.NOTARIZE_MODE == 'skip' }}
        run: |
          echo "::warning::Notarization credentials were not configured. Published zip is signed but not notarized."

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(grep -m1 '^version' ssmver.toml | sed 's/.*= *\"//;s/\"//')"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TS="$(date -u +'%Y%m%d%H%M%S')"
          echo "tag=v${VERSION}-${TS}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "name=iTermPortal ${VERSION} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: itermportal-release-${{ github.run_number }}
          path: |
            build/iTermPortal-macos.zip
            notary-result.json
          if-no-files-found: error
          retention-days: 7

      - name: Create GitHub release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          files: build/iTermPortal-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -f developer_id.p12 notary-result.json /tmp/main-direct.provisionprofile /tmp/sync-direct.provisionprofile
          rm -rf "$RUNNER_TEMP/private_keys"
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
