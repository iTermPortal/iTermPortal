name: Release fPortal (Signed macOS build)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fportal-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]')) }}
    runs-on: macos-latest
    env:
      HAS_P8: ${{ secrets.APPLE_API_KEY_P8 != '' }}
      HAS_NOTARY_CREDS: ${{ (secrets.APPLE_API_KEY != '' && secrets.APPLE_API_ISSUER != '' && secrets.APPLE_API_KEY_P8 != '') || (secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import Apple Developer certificate
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euxo pipefail

          [[ -n "${APPLE_CERTIFICATE:-}" ]] || { echo "Missing APPLE_CERTIFICATE"; exit 1; }
          [[ -n "${APPLE_CERTIFICATE_PASSWORD:-}" ]] || { echo "Missing APPLE_CERTIFICATE_PASSWORD"; exit 1; }
          [[ -n "${KEYCHAIN_PASSWORD:-}" ]] || { echo "Missing KEYCHAIN_PASSWORD"; exit 1; }

          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"

          security import certificate.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | \
            awk -F\" '/Developer ID Application|Mac Developer ID Application/ {print $2; exit}')
          if [[ -z "$CERT_ID" ]]; then
            echo "::error::Developer ID Application identity not found in the imported .p12."
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          echo "CODESIGN_ALLOCATE=$(xcrun -f codesign_allocate)" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key file (optional)
        if: ${{ env.HAS_P8 == 'true' }}
        shell: bash
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
        run: |
          set -euo pipefail
          printf "%s" "$APPLE_API_KEY_P8" > AuthKey.p8

      - name: Build app
        run: ./scripts/build_applescript_app.sh

      - name: Re-sign app with Developer ID
        shell: bash
        run: |
          set -euxo pipefail
          APP_PATH="dist/fPortal.app"
          /usr/bin/codesign --remove-signature "$APP_PATH" 2>/dev/null || true
          /usr/bin/codesign --force --deep --options runtime --timestamp \
            --keychain "$KEYCHAIN_PATH" -s "$APPLE_SIGNING_IDENTITY" "$APP_PATH"
          /usr/bin/codesign --verify --deep --strict --verbose=4 "$APP_PATH"

      - name: Package app
        run: |
          rm -f dist/fPortal-macos.zip
          ditto -c -k --sequesterRsrc --keepParent dist/fPortal.app dist/fPortal-macos.zip

      - name: Optional notarize and staple
        if: ${{ env.HAS_NOTARY_CREDS == 'true' }}
        shell: bash
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euxo pipefail

          try_key() {
            xcrun notarytool submit dist/fPortal-macos.zip \
              --key ./AuthKey.p8 --key-id "$APPLE_API_KEY" --issuer "$APPLE_API_ISSUER" \
              --wait --output-format json | tee notary-result.json
          }

          try_apple_id() {
            xcrun notarytool submit dist/fPortal-macos.zip \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" \
              --wait --output-format json | tee notary-result.json
          }

          if [[ -n "${APPLE_API_KEY:-}" && -n "${APPLE_API_ISSUER:-}" && -f AuthKey.p8 ]]; then
            set +e
            try_key
            EC=$?
            set -e
            if [[ $EC -ne 0 ]]; then
              echo "API key notarization failed, trying Apple ID fallback..."
              try_apple_id
            fi
          else
            try_apple_id
          fi

          xcrun stapler staple -v dist/fPortal.app || true
          xcrun stapler staple -v dist/fPortal-macos.zip || true

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '[:space:]' < VERSION)"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TS="$(date +'%Y%m%d%H%M%S')"
          TAG="v${VERSION}-${TS}-${SHORT_SHA}"
          NAME="fPortal ${VERSION} (${SHORT_SHA})"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          files: |
            dist/fPortal-macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -f certificate.p12 AuthKey.p8
          security delete-keychain "$KEYCHAIN_PATH" || true
