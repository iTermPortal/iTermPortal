name: Release iTermPortal + Update Homebrew Tap

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: itermportal-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      asset_name: ${{ steps.asset_meta.outputs.asset_name }}
      asset_sha256: ${{ steps.asset_meta.outputs.asset_sha256 }}
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_APP_DIST_CERTIFICATE: ${{ secrets.APPLE_APP_DIST_CERTIFICATE }}
      APPLE_APP_DIST_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_APP_DIST_CERTIFICATE_PASSWORD }}
      APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
      APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
      APPLE_INSTALLER_DIST_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_DIST_CERTIFICATE }}
      APPLE_INSTALLER_DIST_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_DIST_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID_FPORTAL: ${{ secrets.APPLE_API_KEY_ID_FPORTAL }}
      APPLE_API_KEY_FPORTAL: ${{ secrets.APPLE_API_KEY_FPORTAL }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_BUNDLE_ID_VAR: ${{ vars.APPLE_APP_BUNDLE_ID }}
      APP_BUNDLE_ID_SECRET: ${{ secrets.APPLE_APP_BUNDLE_ID }}
      HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release version and Homebrew configuration
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail

          VERSION="$(python3 scripts/get_version.py)"
          TAG="v${VERSION}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::ssmver.toml version must use X.Y.Z (example: 2.4.0)."
            exit 1
          fi

          if [[ -z "${HOMEBREW_TAP_REPOSITORY:-}" ]]; then
            echo "::error::Missing repository variable HOMEBREW_TAP_REPOSITORY."
            exit 1
          fi

          if [[ -z "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]]; then
            echo "::error::Missing secret HOMEBREW_TAP_GITHUB_TOKEN."
            exit 1
          fi

          {
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "release_name=iTermPortal $VERSION"
          } >> "$GITHUB_OUTPUT"

          echo "Release metadata:"
          echo "  version: $VERSION"
          echo "  tag: $TAG"
          echo "  branch: ${GITHUB_REF_NAME}"
          echo "  tap repo: $HOMEBREW_TAP_REPOSITORY"

      - name: Resolve release config and diagnostics
        shell: bash
        run: |
          set -euo pipefail

          SIGNING_ENABLED=false
          SIGNING_CERT_SOURCE="none"
          if [[ -n "${APPLE_CERTIFICATE:-}" && -n "${APPLE_CERTIFICATE_PASSWORD:-}" ]]; then
            SIGNING_ENABLED=true
            SIGNING_CERT_SOURCE="APPLE_CERTIFICATE"
          elif [[ -n "${APPLE_APP_DIST_CERTIFICATE:-}" && -n "${APPLE_APP_DIST_CERTIFICATE_PASSWORD:-}" ]]; then
            SIGNING_ENABLED=true
            SIGNING_CERT_SOURCE="APPLE_APP_DIST_CERTIFICATE"
          fi

          INSTALLER_SIGNING_ENABLED=false
          INSTALLER_CERT_SOURCE="none"
          if [[ -n "${APPLE_INSTALLER_CERTIFICATE:-}" && -n "${APPLE_INSTALLER_CERTIFICATE_PASSWORD:-}" ]]; then
            INSTALLER_SIGNING_ENABLED=true
            INSTALLER_CERT_SOURCE="APPLE_INSTALLER_CERTIFICATE"
          elif [[ -n "${APPLE_INSTALLER_DIST_CERTIFICATE:-}" && -n "${APPLE_INSTALLER_DIST_CERTIFICATE_PASSWORD:-}" ]]; then
            INSTALLER_SIGNING_ENABLED=true
            INSTALLER_CERT_SOURCE="APPLE_INSTALLER_DIST_CERTIFICATE"
          fi

          if [[ ("$SIGNING_ENABLED" == "true" || "$INSTALLER_SIGNING_ENABLED" == "true") && -z "${KEYCHAIN_PASSWORD:-}" ]]; then
            echo "::error::KEYCHAIN_PASSWORD is required when a signing certificate is configured."
            exit 1
          fi

          PKG_ENABLED=false
          if [[ "$SIGNING_ENABLED" == "true" && "$INSTALLER_SIGNING_ENABLED" == "true" ]]; then
            PKG_ENABLED=true
          fi

          APPLE_API_KEY_RESOLVED=""
          API_KEY_SOURCE="none"
          if [[ -n "${APPLE_API_KEY:-}" ]]; then
            APPLE_API_KEY_RESOLVED="$APPLE_API_KEY"
            API_KEY_SOURCE="APPLE_API_KEY"
          elif [[ -n "${APPLE_API_KEY_ID_FPORTAL:-}" ]]; then
            APPLE_API_KEY_RESOLVED="$APPLE_API_KEY_ID_FPORTAL"
            API_KEY_SOURCE="APPLE_API_KEY_ID_FPORTAL"
          elif [[ -n "${APPLE_API_KEY_FPORTAL:-}" ]]; then
            APPLE_API_KEY_RESOLVED="$APPLE_API_KEY_FPORTAL"
            API_KEY_SOURCE="APPLE_API_KEY_FPORTAL"
          fi

          NOTARIZE_ENABLED=false
          if [[ -n "$APPLE_API_KEY_RESOLVED" && -n "${APPLE_API_ISSUER:-}" && -n "${APPLE_API_KEY_P8:-}" ]]; then
            NOTARIZE_ENABLED=true
          elif [[ -n "${APPLE_ID:-}" && -n "${APPLE_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; then
            NOTARIZE_ENABLED=true
          fi

          RELEASE_BUNDLE_ID="${APP_BUNDLE_ID_VAR:-}"
          if [[ -z "$RELEASE_BUNDLE_ID" && -n "${APP_BUNDLE_ID_SECRET:-}" ]]; then
            RELEASE_BUNDLE_ID="$APP_BUNDLE_ID_SECRET"
          fi
          if [[ -z "$RELEASE_BUNDLE_ID" ]]; then
            RELEASE_BUNDLE_ID="com.hjoncour.fportal"
          fi

          {
            echo "SIGNING_ENABLED=$SIGNING_ENABLED"
            echo "SIGNING_CERT_SOURCE=$SIGNING_CERT_SOURCE"
            echo "INSTALLER_SIGNING_ENABLED=$INSTALLER_SIGNING_ENABLED"
            echo "INSTALLER_CERT_SOURCE=$INSTALLER_CERT_SOURCE"
            echo "PKG_ENABLED=$PKG_ENABLED"
            echo "NOTARIZE_ENABLED=$NOTARIZE_ENABLED"
            echo "APPLE_API_KEY_RESOLVED=$APPLE_API_KEY_RESOLVED"
            echo "API_KEY_SOURCE=$API_KEY_SOURCE"
            echo "RELEASE_BUNDLE_ID=$RELEASE_BUNDLE_ID"
          } >> "$GITHUB_ENV"

          echo "Release preflight:"
          echo "  ref: ${GITHUB_REF_NAME}"
          echo "  commit: ${GITHUB_SHA:0:7}"
          echo "  signing enabled: $SIGNING_ENABLED"
          echo "  signing cert source: $SIGNING_CERT_SOURCE"
          echo "  installer signing enabled: $INSTALLER_SIGNING_ENABLED"
          echo "  installer cert source: $INSTALLER_CERT_SOURCE"
          echo "  pkg asset enabled: $PKG_ENABLED"
          echo "  notarization enabled: $NOTARIZE_ENABLED"
          echo "  api key source: $API_KEY_SOURCE"
          echo "  release bundle id: $RELEASE_BUNDLE_ID"
          echo "  api issuer present: $([[ -n "${APPLE_API_ISSUER:-}" ]] && echo yes || echo no)"
          echo "  p8 present: $([[ -n "${APPLE_API_KEY_P8:-}" ]] && echo yes || echo no)"
          echo "  apple-id fallback present: $([[ -n "${APPLE_ID:-}" && -n "${APPLE_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]] && echo yes || echo no)"

      - name: Import Apple signing certificate
        if: ${{ env.SIGNING_ENABLED == 'true' || env.INSTALLER_SIGNING_ENABLED == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"

          if [[ "$SIGNING_ENABLED" == "true" ]]; then
            CERT_B64=""
            CERT_PASS=""
            if [[ "$SIGNING_CERT_SOURCE" == "APPLE_CERTIFICATE" ]]; then
              CERT_B64="$APPLE_CERTIFICATE"
              CERT_PASS="$APPLE_CERTIFICATE_PASSWORD"
            elif [[ "$SIGNING_CERT_SOURCE" == "APPLE_APP_DIST_CERTIFICATE" ]]; then
              CERT_B64="$APPLE_APP_DIST_CERTIFICATE"
              CERT_PASS="$APPLE_APP_DIST_CERTIFICATE_PASSWORD"
            else
              echo "::error::Unknown SIGNING_CERT_SOURCE: $SIGNING_CERT_SOURCE"
              exit 1
            fi

            echo "$CERT_B64" | base64 --decode > certificate.p12
            security import certificate.p12 -A -k "$KEYCHAIN_PATH" -P "$CERT_PASS" \
              -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun -T /usr/bin/productbuild
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            echo "Available code-sign identities:"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true

            CERT_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | \
              awk -F\" '/Developer ID Application/ {print $2; exit}')
            if [[ -z "$CERT_ID" ]]; then
              CERT_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | \
                awk -F\" '/Apple Distribution|Mac App Distribution|3rd Party Mac Developer Application/ {print $2; exit}')
              if [[ -n "$CERT_ID" ]]; then
                echo "::warning::Using App Store distribution cert for signing. Notarization requires a Developer ID Application cert; releases will show a Gatekeeper warning. Add APPLE_CERTIFICATE (Developer ID Application) to fix this."
                echo "NOTARIZE_ENABLED=false" >> "$GITHUB_ENV"
              fi
            fi
            if [[ -z "$CERT_ID" ]]; then
              echo "::error::No compatible app signing identity found in imported certificate."
              security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
              exit 1
            fi

            echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
            echo "CODESIGN_ALLOCATE=$(xcrun -f codesign_allocate)" >> "$GITHUB_ENV"
          fi

          if [[ "$INSTALLER_SIGNING_ENABLED" == "true" ]]; then
            INSTALLER_CERT_B64=""
            INSTALLER_CERT_PASS=""
            if [[ "$INSTALLER_CERT_SOURCE" == "APPLE_INSTALLER_CERTIFICATE" ]]; then
              INSTALLER_CERT_B64="$APPLE_INSTALLER_CERTIFICATE"
              INSTALLER_CERT_PASS="$APPLE_INSTALLER_CERTIFICATE_PASSWORD"
            elif [[ "$INSTALLER_CERT_SOURCE" == "APPLE_INSTALLER_DIST_CERTIFICATE" ]]; then
              INSTALLER_CERT_B64="$APPLE_INSTALLER_DIST_CERTIFICATE"
              INSTALLER_CERT_PASS="$APPLE_INSTALLER_DIST_CERTIFICATE_PASSWORD"
            else
              echo "::error::Unknown INSTALLER_CERT_SOURCE: $INSTALLER_CERT_SOURCE"
              exit 1
            fi

            echo "$INSTALLER_CERT_B64" | base64 --decode > installer_certificate.p12
            security import installer_certificate.p12 -A -k "$KEYCHAIN_PATH" -P "$INSTALLER_CERT_PASS" \
              -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/security -T /usr/bin/xcrun
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

            echo "Available installer identities:"
            security find-identity -v -p basic "$KEYCHAIN_PATH" || true

            INSTALLER_ID=$(security find-identity -v -p basic "$KEYCHAIN_PATH" | \
              awk -F\" '/Developer ID Installer|Mac Installer Distribution|3rd Party Mac Developer Installer/ {print $2; exit}')
            if [[ -z "$INSTALLER_ID" ]]; then
              echo "::error::No compatible installer signing identity found in imported installer certificate."
              security find-identity -v -p basic "$KEYCHAIN_PATH" || true
              exit 1
            fi

            echo "INSTALLER_SIGNING_IDENTITY=$INSTALLER_ID" >> "$GITHUB_ENV"
          fi

      - name: Write App Store Connect API key file (optional)
        if: ${{ env.NOTARIZE_ENABLED == 'true' && env.APPLE_API_KEY_P8 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          printf "%s" "$APPLE_API_KEY_P8" > AuthKey.p8

      - name: Build app
        env:
          FPORTAL_BUNDLE_ID: ${{ env.RELEASE_BUNDLE_ID }}
        run: ./scripts/build_applescript_app.sh

      - name: Re-sign app
        if: ${{ env.SIGNING_ENABLED == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          APP_PATH="dist/iTermPortal.app"
          HELPER_PATH="$APP_PATH/Contents/Library/LoginItems/iTermPortalMenu.app"

          xattr -cr "$APP_PATH"

          /usr/bin/codesign --remove-signature "$HELPER_PATH" 2>/dev/null || true
          /usr/bin/codesign --remove-signature "$APP_PATH" 2>/dev/null || true

          /usr/bin/codesign --force \
            --options runtime \
            --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            -s "$APPLE_SIGNING_IDENTITY" \
            "$HELPER_PATH"

          /usr/bin/codesign --force \
            --entitlements config/entitlements/direct-install.plist \
            --options runtime \
            --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            -s "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH"

          /usr/bin/codesign --verify --deep --strict --verbose=4 "$APP_PATH"

      - name: Validate app bundle metadata
        env:
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
        shell: bash
        run: |
          set -euxo pipefail
          APP_PATH="dist/iTermPortal.app"
          INFO_PLIST="$APP_PATH/Contents/Info.plist"
          [[ -d "$APP_PATH" ]] || { echo "::error::Missing $APP_PATH"; exit 1; }
          [[ -d "$APP_PATH/Contents" ]] || { echo "::error::Missing $APP_PATH/Contents"; exit 1; }
          [[ -f "$INFO_PLIST" ]] || { echo "::error::Missing $INFO_PLIST"; exit 1; }

          APP_VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$INFO_PLIST")
          if [[ "$APP_VERSION" != "$RELEASE_VERSION" ]]; then
            echo "::error::App bundle version '$APP_VERSION' does not match release version '$RELEASE_VERSION'."
            exit 1
          fi

          /usr/libexec/PlistBuddy -c "Print :CFBundlePackageType" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" "$INFO_PLIST"

      - name: Warn if release is unsigned
        if: ${{ env.SIGNING_ENABLED != 'true' }}
        run: |
          echo "::warning::No signing certificate configured; publishing unsigned build artifact."

      - name: Notarize and staple app
        id: notarize_app
        if: ${{ env.NOTARIZE_ENABLED == 'true' && env.SIGNING_ENABLED == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail

          ./scripts/package_release_zip.sh dist/iTermPortal.app dist/iTermPortal-macos.zip

          notarize_submit() {
            local target="$1"
            local result_file="$2"
            if [[ -f AuthKey.p8 && -n "${APPLE_API_KEY_RESOLVED:-}" && -n "${APPLE_API_ISSUER:-}" ]]; then
              xcrun notarytool submit "$target" \
                --key ./AuthKey.p8 --key-id "$APPLE_API_KEY_RESOLVED" --issuer "$APPLE_API_ISSUER" \
                --wait --output-format json | tee "$result_file"
            else
              xcrun notarytool submit "$target" \
                --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" \
                --wait --output-format json | tee "$result_file"
            fi

            STATUS=$(python3 -c "import json; print(json.load(open('$result_file')).get('status',''))" 2>/dev/null || echo "")
            SUBMISSION_ID=$(python3 -c "import json; print(json.load(open('$result_file')).get('id',''))" 2>/dev/null || echo "")

            if [[ "$STATUS" != "Accepted" ]]; then
              echo "::error::Notarization was not accepted for $target. Status: '$STATUS'"
              if [[ -n "$SUBMISSION_ID" ]]; then
                echo "Fetching notarization log for submission $SUBMISSION_ID ..."
                if [[ -f AuthKey.p8 && -n "${APPLE_API_KEY_RESOLVED:-}" && -n "${APPLE_API_ISSUER:-}" ]]; then
                  xcrun notarytool log "$SUBMISSION_ID" \
                    --key ./AuthKey.p8 --key-id "$APPLE_API_KEY_RESOLVED" --issuer "$APPLE_API_ISSUER" \
                    2>&1 || true
                else
                  xcrun notarytool log "$SUBMISSION_ID" \
                    --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" \
                    2>&1 || true
                fi
              fi
              exit 1
            fi
            echo "Notarization accepted for $target (submission $SUBMISSION_ID)."
          }

          notarize_submit "dist/iTermPortal-macos.zip" "notary-result.json"

          xcrun stapler staple -v dist/iTermPortal.app
          ./scripts/package_release_zip.sh dist/iTermPortal.app dist/iTermPortal-macos.zip

      - name: Package app (no notarization)
        if: ${{ steps.notarize_app.outcome == 'skipped' }}
        run: ./scripts/package_release_zip.sh dist/iTermPortal.app dist/iTermPortal-macos.zip

      - name: Build signed installer package (.pkg)
        if: ${{ env.PKG_ENABLED == 'true' }}
        timeout-minutes: 10
        shell: bash
        run: |
          set -euxo pipefail
          rm -f dist/iTermPortal-direct-install.pkg dist/iTermPortal-direct-install-unsigned.pkg
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          productbuild \
            --component "dist/iTermPortal.app" /Applications \
            "dist/iTermPortal-direct-install-unsigned.pkg"
          productsign \
            --sign "$INSTALLER_SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            "dist/iTermPortal-direct-install-unsigned.pkg" \
            "dist/iTermPortal-direct-install.pkg"
          rm -f "dist/iTermPortal-direct-install-unsigned.pkg"
          ls -lh "dist/iTermPortal-direct-install.pkg"
          pkgutil --check-signature "dist/iTermPortal-direct-install.pkg"

      - name: Notarize and staple pkg
        id: notarize_pkg
        if: ${{ env.PKG_ENABLED == 'true' && env.NOTARIZE_ENABLED == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail

          if [[ -f AuthKey.p8 && -n "${APPLE_API_KEY_RESOLVED:-}" && -n "${APPLE_API_ISSUER:-}" ]]; then
            xcrun notarytool submit "dist/iTermPortal-direct-install.pkg" \
              --key ./AuthKey.p8 --key-id "$APPLE_API_KEY_RESOLVED" --issuer "$APPLE_API_ISSUER" \
              --wait --output-format json | tee notary-result-pkg.json
          else
            xcrun notarytool submit "dist/iTermPortal-direct-install.pkg" \
              --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" \
              --wait --output-format json | tee notary-result-pkg.json
          fi

          STATUS=$(python3 -c "import json; print(json.load(open('notary-result-pkg.json')).get('status',''))" 2>/dev/null || echo "")
          SUBMISSION_ID=$(python3 -c "import json; print(json.load(open('notary-result-pkg.json')).get('id',''))" 2>/dev/null || echo "")
          if [[ "$STATUS" != "Accepted" ]]; then
            echo "::error::PKG notarization was not accepted. Status: '$STATUS'"
            if [[ -n "$SUBMISSION_ID" ]]; then
              echo "Fetching notarization log for submission $SUBMISSION_ID ..."
              if [[ -f AuthKey.p8 && -n "${APPLE_API_KEY_RESOLVED:-}" && -n "${APPLE_API_ISSUER:-}" ]]; then
                xcrun notarytool log "$SUBMISSION_ID" \
                  --key ./AuthKey.p8 --key-id "$APPLE_API_KEY_RESOLVED" --issuer "$APPLE_API_ISSUER" \
                  2>&1 || true
              else
                xcrun notarytool log "$SUBMISSION_ID" \
                  --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_PASSWORD" \
                  2>&1 || true
              fi
            fi
            exit 1
          fi

          xcrun stapler staple -v dist/iTermPortal-direct-install.pkg

      - name: Warn if signed installer package is unavailable
        if: ${{ env.PKG_ENABLED != 'true' }}
        run: |
          echo "::warning::Signed direct-install package (.pkg) was not created. Configure both app cert and installer cert secrets to enable it."

      - name: Compute release asset metadata
        id: asset_meta
        shell: bash
        run: |
          set -euo pipefail
          ASSET_PATH="dist/iTermPortal-macos.zip"
          [[ -f "$ASSET_PATH" ]] || { echo "::error::Missing $ASSET_PATH"; exit 1; }
          SHA256="$(shasum -a 256 "$ASSET_PATH" | awk '{print $1}')"
          echo "asset_name=$(basename "$ASSET_PATH")" >> "$GITHUB_OUTPUT"
          echo "asset_sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "App asset SHA256: $SHA256"

      - name: Create or move release tag
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.release_meta.outputs.tag }}"

          git fetch --tags --force origin

          REMOTE_TAG_SHA="$(git ls-remote --tags --refs origin "refs/tags/$TAG" | awk '{print $1}')"
          if [[ -n "$REMOTE_TAG_SHA" ]]; then
            echo "Moving existing tag $TAG from ${REMOTE_TAG_SHA:0:7} to ${GITHUB_SHA:0:7}."
          else
            echo "Creating new tag $TAG at ${GITHUB_SHA:0:7}."
          fi

          git tag -f "$TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$TAG"

      - name: Remove stale installer asset when pkg is unavailable
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.release_meta.outputs.tag }}"

          if [[ -f dist/iTermPortal-direct-install.pkg ]]; then
            exit 0
          fi

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            exit 0
          fi

          gh release delete-asset "$TAG" "iTermPortal-direct-install.pkg" --yes 2>/dev/null || true

      - name: Upload release artifact (debug)
        uses: actions/upload-artifact@v4
        with:
          name: itermportal-release-${{ github.run_number }}
          path: |
            dist/iTermPortal-macos.zip
            dist/iTermPortal-direct-install.pkg
            notary-result.json
            notary-result-pkg.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Create GitHub release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.release_name }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          append_body: false
          make_latest: true
          overwrite_files: true
          files: |
            dist/iTermPortal-macos.zip
            dist/iTermPortal-direct-install.pkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print release URL
        if: ${{ steps.gh_release.outcome == 'success' }}
        run: |
          echo "Release created: ${{ steps.gh_release.outputs.url }}"

      - name: Cleanup
        if: always()
        shell: bash
        run: |
          rm -f certificate.p12 installer_certificate.p12 AuthKey.p8
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

  update_homebrew_tap:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update cask in tap repository
        env:
          TAP_PATH: ${{ github.workspace }}/homebrew-tap
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
          RELEASE_SHA256: ${{ needs.release.outputs.asset_sha256 }}
          RELEASE_ASSET_NAME: ${{ needs.release.outputs.asset_name }}
          SOURCE_REPOSITORY: ${{ github.repository }}
        run: ./scripts/update_homebrew_tap.sh
