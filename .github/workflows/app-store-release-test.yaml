name: App Store Release Pipeline Test (iTermPortal)

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: itermportal-app-store-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app_store_release_test:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]')) }}
    runs-on: macos-latest
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_DIST_CERTIFICATE: ${{ secrets.APPLE_APP_DIST_CERTIFICATE }}
      APPLE_APP_DIST_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_APP_DIST_CERTIFICATE_PASSWORD }}
      APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
      APPLE_SYNC_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_SYNC_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APP_BUNDLE_ID_VAR: ${{ vars.APPLE_APP_BUNDLE_ID }}
      APP_BUNDLE_ID_SECRET: ${{ secrets.APPLE_APP_BUNDLE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve expected bundle id
        shell: bash
        run: |
          set -euo pipefail
          APP_BUNDLE_ID="${APP_BUNDLE_ID_VAR:-}"
          if [[ -z "$APP_BUNDLE_ID" && -n "${APP_BUNDLE_ID_SECRET:-}" ]]; then
            APP_BUNDLE_ID="$APP_BUNDLE_ID_SECRET"
          fi
          if [[ -z "$APP_BUNDLE_ID" ]]; then
            APP_BUNDLE_ID="com.hjoncour.fportal"
          fi
          if [[ "$APP_BUNDLE_ID" != "com.hjoncour.fportal" ]]; then
            echo "::error::This project currently expects bundle id com.hjoncour.fportal, got '$APP_BUNDLE_ID'."
            exit 1
          fi
          echo "APP_BUNDLE_ID=$APP_BUNDLE_ID" >> "$GITHUB_ENV"

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            APPLE_TEAM_ID
            APPLE_APP_DIST_CERTIFICATE
            APPLE_APP_DIST_CERTIFICATE_PASSWORD
            APPLE_PROVISIONING_PROFILE_BASE64
            APPLE_SYNC_PROVISIONING_PROFILE_BASE64
            KEYCHAIN_PASSWORD
          )
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing required value: $key"
              exit 1
            fi
          done

      - name: Install provisioning profiles
        shell: bash
        run: |
          set -euo pipefail
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/main.provisionprofile
          MAIN_UUID=$(security cms -D -i /tmp/main.provisionprofile | \
            /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
          cp /tmp/main.provisionprofile "$PROFILES_DIR/$MAIN_UUID.provisionprofile"

          echo "$APPLE_SYNC_PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/sync.provisionprofile
          SYNC_UUID=$(security cms -D -i /tmp/sync.provisionprofile | \
            /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin)
          cp /tmp/sync.provisionprofile "$PROFILES_DIR/$SYNC_UUID.provisionprofile"

          echo "MAIN_UUID=$MAIN_UUID" >> "$GITHUB_ENV"
          echo "SYNC_UUID=$SYNC_UUID" >> "$GITHUB_ENV"

      - name: Import App Store certificate
        shell: bash
        run: |
          set -euxo pipefail

          echo "$APPLE_APP_DIST_CERTIFICATE" | base64 --decode > app_distribution.p12
          KEYCHAIN_PATH="$RUNNER_TEMP/appstore-build.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"

          security import app_distribution.p12 -A -k "$KEYCHAIN_PATH" -P "$APPLE_APP_DIST_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          APP_SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | \
            awk -F\" '/Apple Distribution|Mac App Distribution|3rd Party Mac Developer Application/ {print $2; exit}')

          if [[ -z "$APP_SIGNING_IDENTITY" ]]; then
            echo "::error::No App Store signing identity found."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi

          echo "APP_SIGNING_IDENTITY=$APP_SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Build and archive
        shell: bash
        run: |
          set -euxo pipefail
          APP_VERSION="$(grep -m1 '^version' ssmver.toml | sed 's/.*= *\"//;s/\"//')"
          xcodebuild archive \
            -project iTermPortal.xcodeproj \
            -scheme iTermPortal \
            -configuration AppStore \
            -archivePath build/iTermPortal.xcarchive \
            -derivedDataPath build/DerivedData \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$GITHUB_RUN_NUMBER" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$APP_SIGNING_IDENTITY" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Export archive for App Store
        shell: bash
        run: |
          set -euxo pipefail
          cat > /tmp/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key><dict>
              <key>$APP_BUNDLE_ID</key><string>$MAIN_UUID</string>
              <key>$APP_BUNDLE_ID.sync</key><string>$SYNC_UUID</string>
            </dict>
          </dict></plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/iTermPortal.xcarchive \
            -exportPath build/Export \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Verify bundle structure and entitlements
        shell: bash
        run: |
          set -euo pipefail
          APP="build/iTermPortal.xcarchive/Products/Applications/iTermPortal.app"
          SYNC="$APP/Contents/PlugIns/iTermPortalSync.appex"

          test -d "$APP"
          test -d "$SYNC"

          /usr/libexec/PlistBuddy -c "Print :NSExtension:NSExtensionPointIdentifier" \
            "$SYNC/Contents/Info.plist" | grep -q "com.apple.FinderSync"

          codesign -d --entitlements - "$APP" 2>&1 | grep -q "app-sandbox" || \
            { echo "::error::Main app missing sandbox entitlement"; exit 1; }
          codesign -d --entitlements - "$APP" 2>&1 | grep -q "group.com.hjoncour.fportal" || \
            { echo "::error::Main app missing app group entitlement"; exit 1; }
          codesign -d --entitlements - "$SYNC" 2>&1 | grep -q "com.apple.developer.finder-sync" || \
            { echo "::error::Extension missing finder-sync entitlement"; exit 1; }
          codesign -d --entitlements - "$SYNC" 2>&1 | grep -q "group.com.hjoncour.fportal" || \
            { echo "::error::Extension missing app group entitlement"; exit 1; }

      - name: Upload export artifacts
        uses: actions/upload-artifact@v4
        with:
          name: itermportal-app-store-export
          path: |
            build/Export
            build/iTermPortal.xcarchive
          if-no-files-found: error
          retention-days: 7

      - name: Cleanup keychain
        if: always()
        shell: bash
        run: |
          rm -f app_distribution.p12 /tmp/main.provisionprofile /tmp/sync.provisionprofile
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi
