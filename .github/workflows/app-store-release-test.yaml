name: App Store Release Pipeline Test (fPortal)

on:
  push:
    branches:
      - "**"
  workflow_dispatch:
    inputs:
      upload_to_app_store:
        description: "Upload built package to App Store Connect"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: fportal-app-store-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app_store_release_test:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]')) }}
    runs-on: macos-latest
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_DIST_CERTIFICATE: ${{ secrets.APPLE_APP_DIST_CERTIFICATE }}
      APPLE_APP_DIST_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_APP_DIST_CERTIFICATE_PASSWORD }}
      APPLE_INSTALLER_DIST_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_DIST_CERTIFICATE }}
      APPLE_INSTALLER_DIST_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_DIST_CERTIFICATE_PASSWORD }}
      APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID_FPORTAL: ${{ secrets.APPLE_API_KEY_ID_FPORTAL }}
      APPLE_API_KEY_FPORTAL: ${{ secrets.APPLE_API_KEY_FPORTAL }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      APP_BUNDLE_ID_VAR: ${{ vars.APPLE_APP_BUNDLE_ID }}
      APP_BUNDLE_ID_SECRET: ${{ secrets.APPLE_APP_BUNDLE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets and vars
        shell: bash
        run: |
          set -euo pipefail

          APP_BUNDLE_ID="${APP_BUNDLE_ID_VAR:-}"
          if [[ -z "$APP_BUNDLE_ID" && -n "${APP_BUNDLE_ID_SECRET:-}" ]]; then
            APP_BUNDLE_ID="$APP_BUNDLE_ID_SECRET"
          fi

          APPLE_API_KEY_RESOLVED="${APPLE_API_KEY:-}"
          if [[ -z "$APPLE_API_KEY_RESOLVED" && -n "${APPLE_API_KEY_ID_FPORTAL:-}" ]]; then
            APPLE_API_KEY_RESOLVED="$APPLE_API_KEY_ID_FPORTAL"
          fi
          if [[ -z "$APPLE_API_KEY_RESOLVED" && -n "${APPLE_API_KEY_FPORTAL:-}" ]]; then
            APPLE_API_KEY_RESOLVED="$APPLE_API_KEY_FPORTAL"
          fi

          echo "APP_BUNDLE_ID=$APP_BUNDLE_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_RESOLVED=$APPLE_API_KEY_RESOLVED" >> "$GITHUB_ENV"

          required=(
            APPLE_TEAM_ID
            APPLE_APP_DIST_CERTIFICATE
            APPLE_APP_DIST_CERTIFICATE_PASSWORD
            APPLE_INSTALLER_DIST_CERTIFICATE
            APPLE_INSTALLER_DIST_CERTIFICATE_PASSWORD
            APPLE_PROVISIONING_PROFILE_BASE64
            KEYCHAIN_PASSWORD
          )

          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing required value: $key"
              exit 1
            fi
          done

          if [[ -z "$APP_BUNDLE_ID" ]]; then
            echo "::error::Missing bundle id. Set either variable APPLE_APP_BUNDLE_ID or secret APPLE_APP_BUNDLE_ID."
            exit 1
          fi

      - name: Preflight diagnostics (non-secret)
        shell: bash
        run: |
          set -euo pipefail

          echo "Bundle ID source:"
          if [[ -n "${APP_BUNDLE_ID_VAR:-}" ]]; then
            echo "  using vars.APPLE_APP_BUNDLE_ID"
          elif [[ -n "${APP_BUNDLE_ID_SECRET:-}" ]]; then
            echo "  using secrets.APPLE_APP_BUNDLE_ID"
          fi
          echo "APP_BUNDLE_ID=$APP_BUNDLE_ID"
          echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"

          if [[ -n "${APPLE_API_KEY_RESOLVED:-}" && -n "${APPLE_API_ISSUER:-}" && -n "${APPLE_API_KEY_P8:-}" ]]; then
            echo "App Store API validation: ENABLED"
          else
            echo "App Store API validation: DISABLED (missing API key, issuer, or p8)"
          fi

      - name: Build fPortal app bundle
        run: ./scripts/build_applescript_app.sh

      - name: Prepare app metadata and profile
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="dist/fPortal.app"
          INFO_PLIST="$APP_PATH/Contents/Info.plist"
          APP_VERSION="$(tr -d '[:space:]' < config/VERSION)"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          /usr/libexec/PlistBuddy -c "Delete :CFBundleIdentifier" "$INFO_PLIST" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string ${APP_BUNDLE_ID}" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleShortVersionString" "$INFO_PLIST" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string ${APP_VERSION}" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleVersion" "$INFO_PLIST" >/dev/null 2>&1 || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string ${BUILD_NUMBER}" "$INFO_PLIST"

          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > embedded.provisionprofile
          cp embedded.provisionprofile "$APP_PATH/Contents/embedded.provisionprofile"

          # Parse provisioning profile to make mismatches obvious in CI logs.
          security cms -D -i embedded.provisionprofile > profile.plist
          PROFILE_APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.application-identifier" profile.plist 2>/dev/null || true)
          PROFILE_TEAM_IDENTIFIER=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.team-identifier" profile.plist 2>/dev/null || true)

          if [[ -z "$PROFILE_APP_IDENTIFIER" ]]; then
            echo "::error::Provisioning profile could not be parsed (application-identifier missing)."
            exit 1
          fi

          PROFILE_BUNDLE_ID="${PROFILE_APP_IDENTIFIER#*.}"
          echo "PROFILE_APP_IDENTIFIER=$PROFILE_APP_IDENTIFIER"
          echo "PROFILE_TEAM_IDENTIFIER=$PROFILE_TEAM_IDENTIFIER"
          echo "PROFILE_BUNDLE_ID=$PROFILE_BUNDLE_ID"

          if [[ "$PROFILE_BUNDLE_ID" != "$APP_BUNDLE_ID" ]]; then
            echo "::error::Bundle ID mismatch: profile has '$PROFILE_BUNDLE_ID', workflow uses '$APP_BUNDLE_ID'."
            exit 1
          fi

          if [[ -n "$PROFILE_TEAM_IDENTIFIER" && "$PROFILE_TEAM_IDENTIFIER" != "$APPLE_TEAM_ID" ]]; then
            echo "::error::Team ID mismatch: profile has '$PROFILE_TEAM_IDENTIFIER', secret APPLE_TEAM_ID is '$APPLE_TEAM_ID'."
            exit 1
          fi

      - name: Import App Store certificates
        shell: bash
        run: |
          set -euxo pipefail

          echo "$APPLE_APP_DIST_CERTIFICATE" | base64 --decode > app_distribution.p12
          echo "$APPLE_INSTALLER_DIST_CERTIFICATE" | base64 --decode > installer_distribution.p12

          KEYCHAIN_PATH="$RUNNER_TEMP/appstore-build.keychain-db"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_PATH"

          security import app_distribution.p12 -A -k "$KEYCHAIN_PATH" -P "$APPLE_APP_DIST_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcrun
          security import installer_distribution.p12 -A -k "$KEYCHAIN_PATH" -P "$APPLE_INSTALLER_DIST_CERTIFICATE_PASSWORD" \
            -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/security -T /usr/bin/xcrun

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "Available code-sign identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
          echo "Available installer identities:"
          security find-identity -v -p basic "$KEYCHAIN_PATH" || true

          APP_SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | \
            awk -F\" '/Apple Distribution|Mac App Distribution|3rd Party Mac Developer Application/ {print $2; exit}')

          INSTALLER_SIGNING_IDENTITY=$(security find-identity -v -p basic "$KEYCHAIN_PATH" | \
            awk -F\" '/Mac Installer Distribution|3rd Party Mac Developer Installer/ {print $2; exit}')

          if [[ -z "$APP_SIGNING_IDENTITY" ]]; then
            echo "::error::No App Store application signing identity found."
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi

          if [[ -z "$INSTALLER_SIGNING_IDENTITY" ]]; then
            echo "::error::No App Store installer signing identity found."
            security find-identity -v -p basic "$KEYCHAIN_PATH" || true
            exit 1
          fi

          echo "APP_SIGNING_IDENTITY=$APP_SIGNING_IDENTITY" >> "$GITHUB_ENV"
          echo "INSTALLER_SIGNING_IDENTITY=$INSTALLER_SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Generate entitlements with application identifier
        shell: bash
        run: |
          set -euo pipefail
          APP_ID="${APPLE_TEAM_ID}.${APP_BUNDLE_ID}"

          cat > config/entitlements/app-store-main.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.app-sandbox</key>
            <true/>
            <key>com.apple.security.files.user-selected.read-write</key>
            <true/>
            <key>com.apple.security.automation.apple-events</key>
            <true/>
            <key>com.apple.application-identifier</key>
            <string>${APP_ID}</string>
            <key>com.apple.developer.team-identifier</key>
            <string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          EOF

          cat > config/entitlements/app-store-helper.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.app-sandbox</key>
            <true/>
            <key>com.apple.developer.team-identifier</key>
            <string>${APPLE_TEAM_ID}</string>
          </dict>
          </plist>
          EOF

          echo "Main entitlements:"
          cat config/entitlements/app-store-main.plist
          echo "Helper entitlements:"
          cat config/entitlements/app-store-helper.plist

      - name: Sign app for Mac App Store
        shell: bash
        run: |
          set -euxo pipefail
          APP_PATH="dist/fPortal.app"
          HELPER_PATH="$APP_PATH/Contents/Library/LoginItems/fPortalMenu.app"
          MAIN_ENTITLEMENTS="config/entitlements/app-store-main.plist"
          HELPER_ENTITLEMENTS="config/entitlements/app-store-helper.plist"

          # Strip all existing ad-hoc signatures (recursive for bundles).
          /usr/bin/codesign --remove-signature "$HELPER_PATH" 2>/dev/null || true
          /usr/bin/codesign --remove-signature "$APP_PATH" 2>/dev/null || true

          # Sign inside-out: helper first, then main app.
          # Each component gets its own entitlements, hardened runtime, and a secure timestamp.
          /usr/bin/codesign --force \
            --entitlements "$HELPER_ENTITLEMENTS" \
            --options runtime \
            --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            -s "$APP_SIGNING_IDENTITY" \
            "$HELPER_PATH"

          /usr/bin/codesign --force \
            --entitlements "$MAIN_ENTITLEMENTS" \
            --options runtime \
            --timestamp \
            --keychain "$KEYCHAIN_PATH" \
            -s "$APP_SIGNING_IDENTITY" \
            "$APP_PATH"

          /usr/bin/codesign --verify --deep --strict --verbose=4 "$APP_PATH"

      - name: Verify entitlements on all executables
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="dist/fPortal.app"
          HELPER_BINARY="$APP_PATH/Contents/Library/LoginItems/fPortalMenu.app/Contents/MacOS/fPortalMenu"
          MAIN_BINARY="$APP_PATH/Contents/MacOS/droplet"
          failed=0

          echo "=== Main binary (droplet) entitlements ==="
          codesign -d --entitlements - "$MAIN_BINARY" 2>&1
          if ! codesign -d --entitlements - "$MAIN_BINARY" 2>&1 | grep -q "com.apple.security.app-sandbox"; then
            echo "::error::droplet is missing com.apple.security.app-sandbox entitlement"
            failed=1
          fi

          echo ""
          echo "=== Helper binary (fPortalMenu) entitlements ==="
          codesign -d --entitlements - "$HELPER_BINARY" 2>&1
          if ! codesign -d --entitlements - "$HELPER_BINARY" 2>&1 | grep -q "com.apple.security.app-sandbox"; then
            echo "::error::fPortalMenu is missing com.apple.security.app-sandbox entitlement"
            failed=1
          fi

          echo ""
          echo "=== Signing identities ==="
          codesign -dvv "$MAIN_BINARY" 2>&1 || true
          echo ""
          codesign -dvv "$HELPER_BINARY" 2>&1 || true

          if [[ "$failed" -ne 0 ]]; then
            exit 1
          fi
          echo "All entitlements verified successfully."

      - name: Build signed App Store package
        timeout-minutes: 10
        shell: bash
        run: |
          set -euxo pipefail
          rm -f dist/fPortal-app-store.pkg dist/fPortal-app-store-unsigned.pkg
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          productbuild \
            --component "dist/fPortal.app" /Applications \
            "dist/fPortal-app-store-unsigned.pkg"
          productsign \
            --sign "$INSTALLER_SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            "dist/fPortal-app-store-unsigned.pkg" \
            "dist/fPortal-app-store.pkg"
          rm -f "dist/fPortal-app-store-unsigned.pkg"
          ls -lh "dist/fPortal-app-store.pkg"
          pkgutil --check-signature "dist/fPortal-app-store.pkg" || true

      - name: Optional App Store validation (no upload)
        id: altool_validate
        if: ${{ env.APPLE_API_KEY_RESOLVED != '' && env.APPLE_API_ISSUER != '' && env.APPLE_API_KEY_P8 != '' }}
        continue-on-error: true
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          KEY_FILE="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_RESOLVED}.p8"
          printf "%s" "$APPLE_API_KEY_P8" > "$KEY_FILE"
          export API_PRIVATE_KEYS_DIR="$RUNNER_TEMP/private_keys"
          xcrun altool --validate-app \
            --type osx \
            --file "dist/fPortal-app-store.pkg" \
            --apiKey "$APPLE_API_KEY_RESOLVED" \
            --apiIssuer "$APPLE_API_ISSUER" \
            --verbose

      - name: Warn if App Store validation failed
        if: ${{ steps.altool_validate.outcome == 'failure' }}
        run: |
          echo "::warning::App Store validation failed. Packaging succeeded; check altool logs for API key/profile issues."

      - name: Validate upload prerequisites
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_to_app_store == true }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${APPLE_API_KEY_RESOLVED:-}" || -z "${APPLE_API_ISSUER:-}" || -z "${APPLE_API_KEY_P8:-}" ]]; then
            echo "::error::upload_to_app_store=true requires APPLE_API_KEY (or alias), APPLE_API_ISSUER, and APPLE_API_KEY_P8."
            exit 1
          fi

      - name: Verify App Store Connect app access for bundle id
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_to_app_store == true }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          KEY_FILE="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_RESOLVED}.p8"
          printf "%s" "$APPLE_API_KEY_P8" > "$KEY_FILE"
          export API_PRIVATE_KEYS_DIR="$RUNNER_TEMP/private_keys"

          xcrun altool --list-apps \
            --apiKey "$APPLE_API_KEY_RESOLVED" \
            --apiIssuer "$APPLE_API_ISSUER" \
            --output-format json > appstore-apps.json

          if ! grep -qF "$APP_BUNDLE_ID" appstore-apps.json; then
            echo "::error::Bundle ID '$APP_BUNDLE_ID' is not visible to this App Store Connect API key."
            echo "::error::Fix one of: (1) create app in App Store Connect with this exact bundle id, (2) change APPLE_APP_BUNDLE_ID to existing app id, (3) grant this API key access to that app."
            echo "Visible app list was written to appstore-apps.json artifact."
            exit 1
          fi

      - name: Optional upload to App Store Connect
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_to_app_store == true }}
        timeout-minutes: 20
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p "$RUNNER_TEMP/private_keys"
          KEY_FILE="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_RESOLVED}.p8"
          printf "%s" "$APPLE_API_KEY_P8" > "$KEY_FILE"
          export API_PRIVATE_KEYS_DIR="$RUNNER_TEMP/private_keys"
          xcrun altool --upload-app \
            --type osx \
            --file "dist/fPortal-app-store.pkg" \
            --apiKey "$APPLE_API_KEY_RESOLVED" \
            --apiIssuer "$APPLE_API_ISSUER" \
            --verbose

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fportal-app-store-test
          path: |
            dist/fPortal.app
            dist/fPortal-app-store.pkg
            appstore-apps.json
            profile.plist
          if-no-files-found: error
          retention-days: 7

      - name: Cleanup secrets and keychain
        if: always()
        shell: bash
        run: |
          rm -f embedded.provisionprofile app_distribution.p12 installer_distribution.p12
          rm -rf "$RUNNER_TEMP/private_keys"
          security delete-keychain "$KEYCHAIN_PATH" || true
