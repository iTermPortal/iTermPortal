version = "2.3.2"

[settings]
mode = "branch"
prompt = "never"
prompt_prefixes = [
    "feature",
    "release",
]

[sync]
monorepo = "lockstep"
constants = "curated"
exclude = []

[prefixes]
feature = "minor"
fix = "patch"
release = "major"

[release]
enabled = false
on_bump = []
match = ""
skip = ""

[changelog]
# Enable changelog entry collection on version bumps
enabled = false
# Which bump levels trigger changelog collection (empty = all)
# Example: ["minor", "major"]
on_bump = []
# Template name from ~/.ssmver/templates/changelog/ or "none"
template = "none"
# How to collect changelog entries: "inline" (terminal prompt) or "editor" ($EDITOR)
editor = "editor"
